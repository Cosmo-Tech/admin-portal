# Local Minikube override values for testing
#

name: cosmotech-admin-portal

webapp:
  domainName: ""
  publicUrl: ""
  server:
    replicaCount: 1
    nodeSelector: {}
    image:
      pullSecret: ""
      # Image built locally inside Minikube's Docker daemon
      repository: cosmotech-admin-portal
      tag: local
      # Never pull from registry — use the local image
      pullPolicy: Never

# Runtime config injected via ConfigMap (apis.json)
# Using the Keycloak brewery dev environment as an example.
# Replace with your own values if needed.
config:
  apis:
    warp wa-adx-dev:
      APP_REGISTRATION_CLIENT_ID: "d104fbd6-9464-45d5-a022-83c90ad56906"
      AZURE_TENANT_ID: "e413b834-8be8-4822-a370-be619545cb49"
      COSMOTECH_API_SCOPE: "https://warp.api.cosmotech.com/wa-adx-dev/.default"
      COSMOTECH_API_PATH: "https://warp.api.cosmotech.com/wa-adx-dev/v3"
    wa-vela-dev:
      AUTH_KEYCLOAK_CLIENT_ID: "cosmotech-webapp-client"
      AUTH_KEYCLOAK_REALM: "https://kubernetes.cosmotech.com/keycloak/realms/wa-vela-dev"
      AUTH_KEYCLOAK_ROLES_JWT_CLAIM: "userRoles"
      COSMOTECH_API_PATH: "https://kubernetes.cosmotech.com/wa-vela-dev/v5"   

# Disable ingress for local testing (use port-forward instead)
ingress:
  enabled: false

# Lower resources for Minikube
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi
