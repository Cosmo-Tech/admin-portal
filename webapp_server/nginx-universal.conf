# nginx config for a single-page React application — universal mode
# Serves the patched build from the writable tmpdir instead of the default
# root-owned /usr/share/nginx/html directory.
server {
    listen       8080;
    server_name  _;

    root   /tmp/webapp/build;
    index  index.html;

    # Serve static assets with long cache headers
    location ~* \.(?:js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
